<!DOCTYPE html>
<html>

<head>
    <title>Coordinate Helper</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #333;
            color: white;
            font-family: sans-serif;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        img {
            display: block;
            max-width: 100%;
            border: 1px solid #777;
        }

        #coords {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            font-size: 18px;
        }

        .marker {
            position: absolute;
            width: 4px;
            height: 4px;
            background: red;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body>
    <div id="coords">Click image to get coordinates</div>
    <div class="container">
        <!-- Path depends on where we open it, using absolute file path -->
        <img id="pdfImg" src="file:///C:/Users/srira/Desktop/Spotter%20AI/Mail/blank-paper-log.png" alt="Log">
    </div>

    <script>
        const img = document.getElementById('pdfImg');
        const coordsDiv = document.getElementById('coords');

        img.addEventListener('mousemove', (e) => {
            const rect = img.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            coordsDiv.innerHTML = `X: ${Math.round(x)}, Y: ${Math.round(y)}`;
        });

        img.addEventListener('click', (e) => {
            const rect = img.getBoundingClientRect();
            const x = Math.round(e.clientX - rect.left);
            const y = Math.round(e.clientY - rect.top);

            // Draw marker
            const marker = document.createElement('div');
            marker.className = 'marker';
            marker.style.left = x + 'px';
            marker.style.top = y + 'px';
            document.querySelector('.container').appendChild(marker);

            console.log(`Clicked: X=${x}, Y=${y}`);
            // Let the subagent extract the coordinates easily
            document.title = `Last Click: ${x}, ${y}`;
        });
    </script>
</body>

</html>
